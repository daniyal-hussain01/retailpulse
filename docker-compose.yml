# ── RetailPulse — Local Development Stack ─────────────────────────────────────
#
# Services:
#   postgres-source    :5433   Source OLTP database
#   postgres-airflow   (internal)  Airflow metadata DB
#   kafka              :9092   Kafka broker (KRaft, no Zookeeper)
#   kafka-ui           :8080   Kafka web UI
#   airflow-webserver  :8081   Airflow UI  (admin / admin)
#   airflow-scheduler  (internal)  Airflow task runner
#   api                :8000   FastAPI serving layer
#
# Quick start:
#   1. copy .env.example .env
#   2. docker compose up -d
#   3. Open http://localhost:8081  (Airflow)
#        http://localhost:8080  (Kafka UI)
#        http://localhost:8000/docs  (API)
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow"
  AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-retailpulse_dev_secret_32chars__}"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
  RETAILPULSE_DB_URL: "postgresql://retailpulse:${POSTGRES_PASSWORD:-retailpulse_dev_only}@postgres-source/retailpulse"
  BRONZE_PATH: "/opt/airflow/data/bronze"
  SILVER_PATH: "/opt/airflow/data/silver"
  GOLD_PATH: "/opt/airflow/data/gold"
  DUCKDB_PATH: "/opt/airflow/data/gold/retailpulse.duckdb"
  PII_SALT: "${PII_SALT:-local_dev_salt_change_in_prod}"
  _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka>=2.3 pandas>=1.3 pyarrow>=14.0 dbt-core==1.8.0 dbt-duckdb==1.8.0"

services:

  # ── 1. Source OLTP Database ──────────────────────────────────────────────────
  postgres-source:
    image: postgres:16-alpine
    container_name: rp-postgres-source
    environment:
      POSTGRES_USER: retailpulse
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-retailpulse_dev_only}"
      POSTGRES_DB: retailpulse
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./scripts/sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - postgres_source_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retailpulse -d retailpulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 2. Airflow Metadata Database ─────────────────────────────────────────────
  postgres-airflow:
    image: postgres:16-alpine
    container_name: rp-postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 3. Kafka Broker (KRaft mode — no Zookeeper needed) ───────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "gMW0HOu5TgeZMnjzCrIZww"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── 4. Kafka Web UI ──────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: rp-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: retailpulse-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped

  # ── 5. Airflow Init (runs once, then exits) ───────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.2-python3.11
    container_name: rp-airflow-init
    environment: *airflow-env
    depends_on:
      postgres-airflow:
        condition: service_healthy
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/opt/airflow/.dbt
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@retailpulse.local
      "
    restart: on-failure

  # ── 6. Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.2-python3.11
    container_name: rp-airflow-webserver
    environment: *airflow-env
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-source:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/opt/airflow/.dbt
      - ./spark:/opt/airflow/spark
      - ./ingestion:/opt/airflow/ingestion
      - ./data_quality:/opt/airflow/data_quality
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── 7. Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.2-python3.11
    container_name: rp-airflow-scheduler
    environment: *airflow-env
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      postgres-source:
        condition: service_healthy
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt
      - ./.dbt:/opt/airflow/.dbt
      - ./spark:/opt/airflow/spark
      - ./ingestion:/opt/airflow/ingestion
      - ./data_quality:/opt/airflow/data_quality
    command: scheduler
    restart: unless-stopped

  # ── 8. FastAPI Serving Layer ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: ml/serving/Dockerfile
    container_name: rp-api
    ports:
      - "8000:8000"
    environment:
      DUCKDB_PATH: /data/gold/retailpulse.duckdb
      API_SECRET_KEY: "${API_SECRET_KEY:-dev_api_secret_key_change_in_prod}"
      PII_SALT: "${PII_SALT:-local_dev_salt_change_in_prod}"
      LOG_LEVEL: info
    depends_on:
      postgres-source:
        condition: service_healthy
    volumes:
      - ./data:/data
    restart: unless-stopped

# ── Named Volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_source_data:
  postgres_airflow_data:
  kafka_data: