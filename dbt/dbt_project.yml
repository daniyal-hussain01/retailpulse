name: 'retailpulse'
version: '1.0.0'
config-version: 2

profile: 'retailpulse'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  retailpulse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts

snapshots:
  retailpulse:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at

vars:
  silver_path: "{{ env_var('SILVER_PATH', '../data/silver') }}"
  gold_path:   "{{ env_var('GOLD_PATH', '../data/gold') }}"
